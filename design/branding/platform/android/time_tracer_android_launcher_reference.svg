<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <title>Time Tracer Android Launcher Reference</title>
    <desc>
        Android-tuned launcher reference derived from the background-free brand master.
        Uses a conservative safe area so the icon remains stable across Pixel and
        heavily customized Android launchers such as Xiaomi.
    </desc>

    <defs>
        <linearGradient id="ttAndroidLauncherGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
        </linearGradient>
        <filter id="ttAndroidLauncherShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="0.45" stdDeviation="0.35" flood-color="#000000" flood-opacity="0.18" />
        </filter>
    </defs>

    <g transform="translate(1.68,1.68) scale(0.86)">
        <rect x="1.528" y="1.528" width="20.943" height="20.943" rx="4.76" ry="4.76" fill="#FFFFFF" />
        <g transform="translate(1.179, 0)" filter="url(#ttAndroidLauncherShadow)">
            <path d="M13.528,18.472 L12.458,17.402 L17.11,12.75 H12 V11.25 H17.11 L12.458,6.598 L13.528,5.528 L20,12 Z" fill="url(#ttAndroidLauncherGradient)" />
            <rect x="7.636" y="11.25" width="3.158" height="1.5" fill="url(#ttAndroidLauncherGradient)" opacity="0.50" />
            <rect x="3.732" y="11.25" width="1.952" height="1.5" fill="url(#ttAndroidLauncherGradient)" opacity="0.25" />
        </g>
    </g>
</svg>
