<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <title>Time Tracer Android Launcher Reference</title>
    <desc>
        Android adaptive icon reference derived from the background-free brand master.
        Uses a standard two-layer split: a full-bleed white background layer and a
        foreground symbol constrained to a conservative safe area for Pixel and Xiaomi-like launchers.
        Final outer rounded shape is expected to come from the launcher mask, not from the app resource itself.
    </desc>

    <defs>
        <linearGradient id="ttAndroidLauncherGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
        </linearGradient>
    </defs>

    <rect x="0" y="0" width="24" height="24" fill="#FFFFFF" />

    <g transform="translate(4.667,4.667) scale(0.611111)">
        <g transform="translate(1.179, 0)">
            <path d="M13.528,18.472 L12.458,17.402 L17.11,12.75 H12 V11.25 H17.11 L12.458,6.598 L13.528,5.528 L20,12 Z" fill="url(#ttAndroidLauncherGradient)" />
            <rect x="7.636" y="11.25" width="3.158" height="1.5" fill="url(#ttAndroidLauncherGradient)" opacity="0.50" />
            <rect x="3.732" y="11.25" width="1.952" height="1.5" fill="url(#ttAndroidLauncherGradient)" opacity="0.25" />
        </g>
    </g>
</svg>
