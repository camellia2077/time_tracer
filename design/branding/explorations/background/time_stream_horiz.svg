<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <defs>
        <!-- Text masking or subtle coloring -->
        <linearGradient id="textFade" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#64748B;stop-opacity:0.02" />
            <stop offset="50%" style="stop-color:#64748B;stop-opacity:0.08" />
            <stop offset="100%" style="stop-color:#64748B;stop-opacity:0.02" />
        </linearGradient>
    </defs>
    
    <rect x="1" y="1" width="22" height="22" rx="5" ry="5" fill="#FFFFFF" />

    <!-- Advanced Layer: Invisible Time Stream (Tiny monospace text) -->
    <!-- Contains 24-hour time formats (HH:MM) to represent the flow of time -->
    <!-- Using extremely low opacity so it only reveals upon close inspection -->
                    <g font-family="monospace" font-size="1.2" font-weight="bold" fill="url(#textFade)" letter-spacing="0.2">
        <text y="6.0">
            <tspan x="3.5" text-anchor="middle">00:00</tspan>
            <tspan x="9.2" text-anchor="middle">02:43</tspan>
            <tspan x="14.8" text-anchor="middle">05:27</tspan>
            <tspan x="20.5" text-anchor="middle">08:10</tspan>
        </text>
        <text y="12.5">
            <tspan x="3.5" text-anchor="middle">10:54</tspan>
            <tspan x="9.2" text-anchor="middle">13:38</tspan>
            <tspan x="14.8" text-anchor="middle">16:21</tspan>
            <tspan x="20.5" text-anchor="middle">19:05</tspan>
        </text>
        <text y="19.0">
            <tspan x="3.5" text-anchor="middle">21:49</tspan>
            <tspan x="9.2" text-anchor="middle">00:32</tspan>
            <tspan x="14.8" text-anchor="middle">03:16</tspan>
            <tspan x="20.5" text-anchor="middle">06:00</tspan>
        </text>
    </g>
</svg>
