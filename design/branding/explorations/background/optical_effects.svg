<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <defs>
        <!-- Arrow Gradient -->
        <linearGradient id="gradSharpRoundedWhiteGoldenShadow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
        </linearGradient>

        <!-- Arrow Drop Shadow -->
        <filter id="ambientShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="0.5" stdDeviation="0.75" flood-color="#000000" flood-opacity="0.12" />
        </filter>
        
        <!-- Inner shadow / Bevel lighting gradient (Top edge lighter, bottom edge darker) -->
        <linearGradient id="innerShadowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#000000;stop-opacity:0.1" />
            <stop offset="20%" style="stop-color:#000000;stop-opacity:0.0" />
            <stop offset="80%" style="stop-color:#000000;stop-opacity:0.0" />
            <stop offset="100%" style="stop-color:#000000;stop-opacity:0.12" />
        </linearGradient>

        <!-- Inner Bevel Highlights -->
        <linearGradient id="innerHighlightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
            <stop offset="20%" style="stop-color:#FFFFFF;stop-opacity:0" />
        </linearGradient>
    </defs>
    
    <!-- Base White Background -->
    <rect x="1" y="1" width="22" height="22" rx="5" ry="5" fill="#FFFFFF" />

    <!-- Optical Effects Layer: Inner Shadow & Highlight Borders -->
    <!-- Gives it a carved or inset panel look -->
    <rect x="1" y="1" width="22" height="22" rx="5" ry="5" fill="none" stroke="url(#innerShadowGradient)" stroke-width="1.2" />
    <rect x="1.5" y="1.5" width="21" height="21" rx="4.5" ry="4.5" fill="none" stroke="url(#innerHighlightGradient)" stroke-width="0.8" />


</svg>
