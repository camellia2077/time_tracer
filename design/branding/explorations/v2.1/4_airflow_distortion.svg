<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <defs>
        <linearGradient id="gradSharpRoundedWhiteGoldenShadow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
        </linearGradient>

        <filter id="ambientShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="0.5" stdDeviation="0.75" flood-color="#000000" flood-opacity="0.12" />
        </filter>

        <!-- Airflow Gradient: fade out at edges -->
        <linearGradient id="flowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#CBD5E1;stop-opacity:0" />
            <stop offset="50%" style="stop-color:#CBD5E1;stop-opacity:0.6" />
            <stop offset="100%" style="stop-color:#CBD5E1;stop-opacity:0" />
        </linearGradient>
    </defs>
    
    <rect x="1" y="1" width="22" height="22" rx="5" ry="5" fill="#FFFFFF" />

    <!-- Advanced Subtle Layer: Airflow/Distortion Field -->
    <g fill="none" stroke="url(#flowGradient)" stroke-width="0.15" stroke-linecap="round" opacity="0.4">
        <!-- Top airflow -->
        <path d="M 2 8 C 8 8, 10 5, 16 5 C 19 5, 22 6, 22 6" />
        <path d="M 1 10 C 7 10, 11 7, 15 7 C 19 7, 23 9, 23 9" />
        <!-- Middle airflow (splitting around the arrow) -->
        <path d="M 2 12 C 6 12, 10 9, 14 10 C 18 11, 22 13, 22 13" />
        <path d="M 2 14 C 7 14, 10 17, 15 17 C 19 17, 22 15, 22 15" />
        <!-- Bottom airflow -->
        <path d="M 1 16 C 6 16, 8 19, 14 19 C 18 19, 23 18, 23 18" />
        <path d="M 2 18 C 8 18, 12 21, 18 21 C 20 21, 23 20, 23 20" />
    </g>

    <g filter="url(#ambientShadow)">
        <path d="M14,18l-1.07,-1.07 4.18,-4.18H12V11.25h5.11L12.93,7.07 14,6l6,6 -6,6Z" fill="url(#gradSharpRoundedWhiteGoldenShadow)" />
        <rect x="7.577" y="11.25" width="3.578" height="1.5" fill="url(#gradSharpRoundedWhiteGoldenShadow)" opacity="0.6" />
        <rect x="4" y="11.25" width="2.211" height="1.5" fill="url(#gradSharpRoundedWhiteGoldenShadow)" opacity="0.3" />
    </g>
</svg>
