<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <defs>
        <!-- Arrow Gradient -->
        <linearGradient id="gradSharpRoundedWhiteGoldenShadow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
        </linearGradient>

        <!-- Arrow Drop Shadow -->
        <filter id="ambientShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="0.5" stdDeviation="0.75" flood-color="#000000" flood-opacity="0.12" />
        </filter>

        <!-- Micro Dot Grid Pattern -->
        <pattern id="dotGrid" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="0.25" fill="#475569" opacity="0.08" />
        </pattern>
    </defs>
    
    <!-- Solid White Background -->
    <rect x="1" y="1" width="22" height="22" rx="5" ry="5" fill="#FFFFFF" />

    <!-- Top layer: Dot Grid -->
    <rect x="1" y="1" width="22" height="22" rx="5" ry="5" fill="url(#dotGrid)" />
    
    <!-- Top layer: Golden ratio construction lines -->
    <!-- Opacity extremely low for subtleness -->
    <g stroke="#4F46E5" stroke-width="0.1" opacity="0.3" stroke-linecap="round" fill="none">
        <!-- Horizontal center line -->
        <line x1="2" y1="12" x2="22" y2="12" stroke-dasharray="0.3 0.6" />
        
        <!-- Vertical segment dividers based on the trails -->
        <line x1="4" y1="8" x2="4" y2="16" stroke-dasharray="0.3 0.6" />
        <line x1="6.211" y1="10" x2="6.211" y2="14" />
        
        <line x1="7.577" y1="10" x2="7.577" y2="14" />
        <line x1="11.155" y1="10" x2="11.155" y2="14" />
        
        <!-- Bounding box for main arrow -->
        <rect x="12" y="6" width="8" height="12" stroke-dasharray="0.3 0.6" stroke-width="0.08" />
    </g>

    <!-- The actual elements -->
    <g filter="url(#ambientShadow)">
        <path d="M14,18l-1.07,-1.07 4.18,-4.18H12V11.25h5.11L12.93,7.07 14,6l6,6 -6,6Z" fill="url(#gradSharpRoundedWhiteGoldenShadow)" />
        <rect x="7.577" y="11.25" width="3.578" height="1.5" fill="url(#gradSharpRoundedWhiteGoldenShadow)" opacity="0.6" />
        <rect x="4" y="11.25" width="2.211" height="1.5" fill="url(#gradSharpRoundedWhiteGoldenShadow)" opacity="0.3" />
    </g>
</svg>
