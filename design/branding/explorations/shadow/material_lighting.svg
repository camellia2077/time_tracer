<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <defs>
        <!-- Background Gradient: Pure white to very light slate -->
        <linearGradient id="bgAmbientGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#F8FAFC;stop-opacity:1" />
        </linearGradient>
        
        <!-- Arrow Gradient -->
        <linearGradient id="gradSharpRoundedWhiteGoldenShadow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
        </linearGradient>

        <!-- Arrow Drop Shadow -->
        <filter id="ambientShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="0.5" stdDeviation="0.75" flood-color="#000000" flood-opacity="0.12" />
        </filter>

        <!-- Core Glow for Arrow -->
        <filter id="coreGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="blur" />
        </filter>
    </defs>
    
    <!-- Background with Ambient Gradient -->
    <rect x="1" y="1" width="22" height="22" rx="5" ry="5" fill="url(#bgAmbientGradient)" />

    <!-- Core Glow element behind arrow using the starting color of the arrow -->
    <ellipse cx="12" cy="12" rx="6" ry="4" fill="#4F46E5" opacity="0.15" filter="url(#coreGlow)" />

    <g filter="url(#ambientShadow)">
        <path d="M14,18l-1.07,-1.07 4.18,-4.18H12V11.25h5.11L12.93,7.07 14,6l6,6 -6,6Z" fill="url(#gradSharpRoundedWhiteGoldenShadow)" />
        <rect x="7.577" y="11.25" width="3.578" height="1.5" fill="url(#gradSharpRoundedWhiteGoldenShadow)" opacity="0.6" />
        <rect x="4" y="11.25" width="2.211" height="1.5" fill="url(#gradSharpRoundedWhiteGoldenShadow)" opacity="0.3" />
    </g>
</svg>
