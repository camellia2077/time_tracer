<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <defs>
        <linearGradient id="gradSharpRoundedWhiteGoldenShadow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
        </linearGradient>

        <filter id="ambientShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="0.5" stdDeviation="0.75" flood-color="#000000" flood-opacity="0.12" />
        </filter>

        <!-- Subtle shadow for frosted glass layers -->
        <filter id="layerShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#0F172A" flood-opacity="0.06" />
        </filter>
        
        <!-- Base off-white for depth -->
        <linearGradient id="baseOffWhite" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#F1F5F9;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- Bottom Layer: Base chassis -->
    <rect x="1" y="1" width="22" height="22" rx="5" ry="5" fill="url(#baseOffWhite)" />

    <!-- Middle Layer: Left frosted panel -->
    <rect x="2" y="3" width="9" height="18" rx="3" ry="3" fill="#FFFFFF" filter="url(#layerShadow)" />
    
    <!-- Middle Layer: Right frosted panel, slightly offset -->
    <rect x="13" y="2" width="9" height="20" rx="3" ry="3" fill="#FFFFFF" filter="url(#layerShadow)" />

    <!-- Top Focus Layer: Elevated white platform for arrow -->
    <rect x="3" y="6" width="18" height="12" rx="2" ry="2" fill="#FFFFFF" filter="url(#layerShadow)" />

    <g filter="url(#ambientShadow)">
        <path d="M14,18l-1.07,-1.07 4.18,-4.18H12V11.25h5.11L12.93,7.07 14,6l6,6 -6,6Z" fill="url(#gradSharpRoundedWhiteGoldenShadow)" />
        <rect x="7.577" y="11.25" width="3.578" height="1.5" fill="url(#gradSharpRoundedWhiteGoldenShadow)" opacity="0.6" />
        <rect x="4" y="11.25" width="2.211" height="1.5" fill="url(#gradSharpRoundedWhiteGoldenShadow)" opacity="0.3" />
    </g>
</svg>
