# Exchange command tests

[[commands]]
name = "Exchange Export Tracer Package"
stage = "exchange"
args = ["--output", "{output_dir}/crypt/test-data.tracer", "exchange", "export", "--in", "{data_path}"]
stdin_input = "phase3pass\nphase3pass\n"
expect_exit = 0
expect_stdout_contains = [
  "Exported complete tracer exchange package:",
  "Included payload TXT files:",
  "Included converter TOML files:",
  "Manifest included: yes",
]
expect_files = ["{output_dir}/crypt/test-data.tracer"]

[[commands]]
name = "Exchange Inspect Tracer Package"
stage = "exchange"
args = ["exchange", "inspect", "--in", "{output_dir}/crypt/test-data.tracer"]
stdin_input = "phase3pass\n"
expect_exit = 0
expect_stdout_contains = [
  "version: 2",
  "compression_id: 1",
  "compression_level: 1",
  "Package:",
  "package_type: tracer_exchange",
  "package_version: 3",
  "producer_platform: windows",
  "producer_app: time_tracer_cli",
  "created_at_utc: ",
  "source_root_name: data",
  "payload_file_count: 24",
  "payload/2025/2025-01.txt: present",
  "payload/2026/2026-12.txt: present",
  "config/converter/interval_processor_config.toml: present",
  "config/converter/alias_mapping.toml: present",
  "config/converter/duration_rules.toml: present",
]

[[commands]]
 name = "Exchange Import Tracer Package"
stage = "exchange"
args = ["exchange", "import", "--in", "{output_dir}/crypt/test-data.tracer"]
stdin_input = "phase3pass\n"
expect_exit = 0
expect_stdout_contains = [
  "Imported complete tracer exchange package:",
  "Updated active text root:",
  "Applied converter config: yes",
  "Replaced months: 24",
  "Preserved local months: 0",
  "Rebuilt months: 24",
  "Database rebuilt: yes",
]
expect_files = [
  "{exe_dir}/input/full/2025/2025-01.txt",
  "{exe_dir}/input/full/2026/2026-12.txt",
  "{exe_dir}/output/db/time_data.sqlite3",
]
expect_file_contains = [
  "{exe_dir}/input/full/2025/2025-01.txt::y2025",
  "{exe_dir}/input/full/2026/2026-12.txt::y2026",
]

[[commands]]
 name = "Exchange Import Tracer Package Custom Output"
stage = "exchange"
args = ["--output", "{output_dir}/custom_decrypt", "exchange", "import", "--in", "{output_dir}/crypt/test-data.tracer"]
stdin_input = "phase3pass\n"
expect_exit = 0
expect_stdout_contains = [
  "Imported complete tracer exchange package:",
  "Updated active text root:",
  "Database rebuilt: yes",
]

[[commands]]
name = "Prepare Exchange Import Config Refresh Fixture"
stage = "exchange"
raw_command = true
args = [
  "python",
  "${repo_root}/test/suites/tracer_windows_rust_cli/scripts/manage_exchange_config_refresh_fixture.py",
  "prepare",
  "--workspace-root",
  "{exe_dir}",
  "--scenario-root",
  "{output_dir}/exchange_config_refresh",
  "--source-txt",
  "{data_path}/2026/2026-03.txt",
]
expect_exit = 0
expect_stdout_contains = ["[PASS] prepared exchange config refresh fixture"]

[[commands]]
name = "Exchange Export Tracer Package With Updated Config"
stage = "exchange"
args = [
  "--output",
  "{output_dir}/crypt/config-refresh.tracer",
  "exchange",
  "export",
  "--in",
  "{output_dir}/exchange_config_refresh/custom_data",
]
stdin_input = "phase3pass\nphase3pass\n"
expect_exit = 0
expect_files = ["{output_dir}/crypt/config-refresh.tracer"]

[[commands]]
name = "Restore Stale Runtime Before Config Refresh Import"
stage = "exchange"
raw_command = true
args = [
  "python",
  "${repo_root}/test/suites/tracer_windows_rust_cli/scripts/manage_exchange_config_refresh_fixture.py",
  "restore",
  "--workspace-root",
  "{exe_dir}",
  "--scenario-root",
  "{output_dir}/exchange_config_refresh",
]
expect_exit = 0
expect_stdout_contains = ["[PASS] restored stale runtime config and cleared runtime state"]

[[commands]]
name = "Exchange Import Tracer Package Refreshes Active Config"
stage = "exchange"
args = ["exchange", "import", "--in", "{output_dir}/crypt/config-refresh.tracer"]
stdin_input = "phase3pass\n"
expect_exit = 0
expect_stdout_contains = [
  "Imported complete tracer exchange package:",
  "Applied converter config: yes",
  "Replaced months: 1",
  "Preserved local months: 0",
  "Rebuilt months: 1",
  "Database rebuilt: yes",
]
expect_files = [
  "{exe_dir}/input/full/2026/2026-03.txt",
  "{exe_dir}/output/db/time_data.sqlite3",
]
expect_file_contains = [
  "{exe_dir}/input/full/2026/2026-03.txt::0210cliimportalias",
  "{exe_dir}/config/converter/alias_mapping.toml::\"cliimportalias\" = \"zzdemo_only\"",
]

[[commands]]
name = "Pipeline Validate Imported Text With Refreshed Config"
stage = "exchange"
args = ["pipeline", "validate", "all", "{exe_dir}/input/full", "--no-date-check"]
expect_exit = 0
expect_stderr_contains = [
  "Structure validation passed for 1 files.",
  "Logic validation passed.",
]

[[commands]]
name = "Query Tree Uses Imported Config Mapping"
stage = "exchange"
args = ["query", "tree", "zzdemo", "--db", "{db_path}"]
expect_exit = 0
expect_stdout_contains = [
  "zzdemo [zzdemo]",
  "only [zzdemo_only]",
]
