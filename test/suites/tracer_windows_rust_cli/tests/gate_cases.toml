[markdown]
# Names are the stable golden file names used by audit checks.
# Paths are source report locations generated by current suite exports.
# IMPORTANT:
# `recent`-style golden checks must stay deterministic in CI, so they are
# captured via `recent <days> --as-of <YYYY-MM-DD>` (not "today - N days").
# Keep this anchor unchanged unless you intentionally refresh golden snapshots.
# `recent_case_name` should encode the frozen resolved window to avoid ambiguity.
range_case_name = "range_2026-01-01_2026-01-31.md"
range_argument = "2026-01-01|2026-01-31"
recent_case_name = "recent_fixed_window_2026-03-30_2026-04-05.md"
recent_days = 7
recent_as_of = "2026-04-05"

[[markdown.file_cases]]
name = "day_2026-01-03.md"
source_relative_path = "day/2026/01/2026-01-01.md"

[[markdown.file_cases]]
name = "month_2026-05.md"
source_relative_path = "month/2026-01.md"

[[markdown.file_cases]]
name = "week_2026-W05.md"
source_relative_path = "week/2026-W05.md"

[[markdown.file_cases]]
name = "year_2025.md"
source_relative_path = "year/2025.md"

[[markdown.file_cases]]
name = "range_2026-05-01_2026-05-31.md"
source_relative_path = "range/2026-05-01_2026-05-31.md"

[triplet]
range_case_name_template = "range_2026-01-01_2026-01-31.{ext}"
range_argument = "2026-01-01|2026-01-31"

[[triplet.file_cases]]
name_template = "day_2026-01-03.{ext}"
source_relative_path_template = "day/2026/01/2026-01-01.{ext}"

[[triplet.file_cases]]
name_template = "month_2026-05.{ext}"
source_relative_path_template = "month/2026-01.{ext}"
