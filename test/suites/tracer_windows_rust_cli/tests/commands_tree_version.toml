[[commands]]
name = "Version Check"
stage = "version"
args = ["--version"]
expect_exit = 0
expect_stdout_regex = [
  "(?m)^time_tracer_cli\\s+\\S+$",
]

[[commands]]
name = "Global Help"
stage = "version"
args = ["--help"]
expect_exit = 0
expect_stdout_contains = [
  "Rust CLI shell for time tracer",
  "Usage: time_tracer_cli.exe [OPTIONS] <COMMAND>",
  "Commands:",
  "query",
  "chart",
  "pipeline",
  "report",
  "exchange",
  "licenses",
  "Options:",
  "-v, --version",
  "-h, --help",
]

[[commands]]
name = "Project License"
stage = "version"
args = ["--license"]
expect_exit = 0
expect_stdout_contains = ["TimeTracer project license: Apache License 2.0", "Run `licenses`"]

[[commands]]
name = "Third-party Licenses Summary"
stage = "version"
args = ["licenses"]
expect_exit = 0
expect_stdout_contains = ["Third-party licenses (summary):", "nlohmann/json", "clap"]

[[commands]]
name = "Third-party Licenses Full"
stage = "version"
args = ["licenses", "--full"]
expect_exit = 0
expect_stdout_contains = ["Third-party licenses (full):", "License URL: https://www.apache.org/licenses/LICENSE-2.0"]

[[commands]]
name = "Tracer Easter Egg"
stage = "version"
args = ["tracer"]
expect_exit = 0
expect_stdout_contains = ["timetracer is here"]

[[commands]]
name = "Motto Easter Egg"
stage = "version"
args = ["motto"]
expect_exit = 0
expect_stdout_contains = ["Trace your time, log your life."]

[[commands]]
name = "Doctor Check"
stage = "version"
args = ["doctor"]
expect_exit = 0
expect_stdout_contains = ["Runtime Doctor", "Summary: required"]

# Tree command tests
[[commands]]
name = "Query Tree Help"
stage = "tree"
args = ["query", "tree", "--help"]
expect_exit = 0
expect_stdout_contains = [
  "Display project structure as a tree",
  "Usage: time_tracer_cli.exe query tree [OPTIONS] [ROOT]",
  "[ROOT]",
  "-l, --level <LEVEL>",
  "-r, --roots",
]

[[commands]]
name = "Query Data Help"
stage = "tree"
args = ["query", "data", "--help"]
expect_exit = 0
expect_stdout_contains = [
  "Run semantic data queries",
  "Usage: time_tracer_cli.exe query data [OPTIONS] <ACTION>",
  "<ACTION>",
  "--data-output <DATA_OUTPUT>",
  "possible values: text, json",
  "--period <PERIOD>",
]

[[commands]]
name = "Tree Full"
stage = "tree"
args = ["query", "tree", "--db", "{db_path}"]
expect_exit = 0

[[commands]]
name = "Tree Root Path"
stage = "tree"
args = ["query", "tree", "study", "--db", "{db_path}"]
expect_exit = 0
expect_stdout_contains = ["study"]

[[commands]]
name = "Tree Roots"
stage = "tree"
args = ["query", "tree", "--roots", "--db", "{db_path}"]
expect_exit = 0

[[commands]]
name = "Tree Level 0"
stage = "tree"
args = ["query", "tree", "-l", "0", "--db", "{db_path}"]
expect_exit = 0

[[commands]]
name = "Tree Level 1"
stage = "tree"
args = ["query", "tree", "-l", "1", "--db", "{db_path}"]
expect_exit = 0

[[commands]]
name = "Tree Level 3"
stage = "tree"
args = ["query", "tree", "-l", "3", "--db", "{db_path}"]
expect_exit = 0
