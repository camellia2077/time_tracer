name_template = "Report Export Yearly ({year}) [{fmt}]"
template = ["report", "export", "year", "{year}", "--format", "{fmt}", "--db", "{db_path}", "--output", "{export_output_dir}"]
matrix = { year = ["2025", "2026"], fmt = ["md", "tex", "typ"] }

[[command_groups]]
name = "Report Export Recent"
