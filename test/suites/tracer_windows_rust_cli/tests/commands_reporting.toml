name_template = "Report Export Monthly ({month}) [{fmt}]"
template = ["report", "export", "month", "{month}", "--format", "{fmt}", "--db", "{db_path}", "--output", "{export_output_dir}"]
matrix = { month = ["2026-01", "202605", "202606"], fmt = ["md", "tex", "typ"] }

[[command_groups]]
name = "Report Export Weekly"
stage = "report-export"
name_template = "Report Export Weekly ({week}) [{fmt}]"
template = ["report", "export", "week", "{week}", "--format", "{fmt}", "--db", "{db_path}", "--output", "{export_output_dir}"]
matrix = { week = ["2026-W01", "2026-W05"], fmt = ["md", "tex", "typ"] }

[[command_groups]]
name = "Report Export Yearly"
