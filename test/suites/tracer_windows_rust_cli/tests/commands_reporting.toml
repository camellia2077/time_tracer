# ==============================================================================
#                     REPORTING COMMAND GROUPS
# ==============================================================================
# Shared fixture range for reporting targets:
#   - earliest supported ISO target: 2025-01-01
#   - latest supported ISO target:   2026-12-31
# Compact CLI inputs such as YYYYMMDD / YYYYMM are allowed in this suite only
# when they normalize into the ISO range above.
[[command_groups]]
name = "Render Daily"
stage = "report"
name_template = "Render Daily ({date}) [{fmt}]"
template = ["report", "render", "day", "{date}", "--format", "{fmt}", "--db", "{db_path}"]
matrix = { date = ["2026-01-01", "20260101", "20260201"], fmt = ["md", "tex", "typ"] }

[[command_groups]]
name = "Render Monthly"
stage = "report"
name_template = "Render Monthly ({month}) [{fmt}]"
template = ["report", "render", "month", "{month}", "--format", "{fmt}", "--db", "{db_path}"]
matrix = { month = ["2026-01", "202605", "202606"], fmt = ["md", "tex", "typ"] }

[[command_groups]]
name = "Render Weekly"
stage = "report"
name_template = "Render Weekly ({week}) [{fmt}]"
template = ["report", "render", "week", "{week}", "--format", "{fmt}", "--db", "{db_path}"]
matrix = { week = ["2026-W01", "2026-W05"], fmt = ["md", "tex", "typ"] }

[[command_groups]]
name = "Render Yearly"
stage = "report"
name_template = "Render Yearly ({year}) [{fmt}]"
template = ["report", "render", "year", "{year}", "--format", "{fmt}", "--db", "{db_path}"]
matrix = { year = ["2025", "2026"], fmt = ["md", "tex", "typ"] }

[[command_groups]]
name = "Render Recent"
stage = "report"
name_template = "Render Recent ({days} days) [{fmt}]"
template = ["report", "render", "recent", "{days}", "--format", "{fmt}", "--db", "{db_path}"]
matrix = { days = [7, 10, 15], fmt = ["md", "tex", "typ"] }

[[commands]]
name = "Render Range Empty Window Includes Window Hint"
stage = "report"
args = ["report", "render", "range", "2024-12-01|2024-12-31", "--format", "md", "--db", "{db_path}"]
expect_stdout_contains = [
  "No time records found in this period.",
  "Window query returned no records.",
  "start_date=2024-12-01",
  "end_date=2024-12-31",
  "requested_days=31",
  "matched_day_count=0",
  "matched_record_count=0",
]

[[command_groups]]
name = "Render Range"
stage = "report"
name_template = "Render Range ({range}) [{fmt}]"
template = ["report", "render", "range", "{range}", "--format", "{fmt}", "--db", "{db_path}"]
matrix = { range = ["2026-01-01|2026-01-31", "2026-05-01|2026-05-31"], fmt = ["md", "tex", "typ"] }

[[command_groups]]
name = "Report Export Daily"
stage = "report-export"
name_template = "Report Export Daily ({date}) [{fmt}]"
template = ["report", "export", "day", "{date}", "--format", "{fmt}", "--db", "{db_path}", "--output", "{export_output_dir}"]
matrix = { date = [ "2026-01-01", "20260102", "2025-01-03", "2026-01-03", "20260201"], fmt = ["md", "tex", "typ"] }

[[command_groups]]
name = "Report Export Monthly"
