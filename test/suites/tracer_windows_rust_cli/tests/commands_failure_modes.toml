# Failure-path regression cases for CLI exit code / stderr contract.
# Note:
# - bootstrap runtime guard cases (missing core/config dll) remain covered by
#   `python test/run.py runtime-guard --build-dir build_fast`.

[[commands]]
name = "Unknown Command Returns CommandNotFound"
stage = "failure"
args = ["unknown_cmd"]
expect_exit = 2
expect_error_code = "cli.command_not_found"
expect_error_category = "cli"
expect_hints_contains = ["Run with --help to see available commands."]
expect_stderr_contains = ["Unknown command 'unknown_cmd'."]

[[commands]]
name = "Legacy Pre Command Removed"
stage = "failure"
args = ["pre"]
