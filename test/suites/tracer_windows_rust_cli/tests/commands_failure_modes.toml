[[commands]]
name = "Query Invalid Subcommand Returns InvalidArguments"
stage = "failure"
args = ["query", "foo", "20260101", "--db", "{db_path}"]
expect_exit = 3
expect_error_code = "cli.invalid_arguments"
expect_error_category = "cli"
expect_hints_contains = ["Run command --help to inspect required arguments."]
expect_stderr_contains = ["unrecognized subcommand 'foo'", "Usage: time_tracer_cli.exe query"]

[[commands]]
name = "Query Tree Invalid Level Returns InvalidArguments"
stage = "failure"
args = ["query", "tree", "-l", "abc", "--db", "{db_path}"]
expect_exit = 3
expect_error_code = "cli.invalid_arguments"
expect_error_category = "cli"
expect_hints_contains = ["Run command --help to inspect required arguments."]
expect_stderr_contains = ["invalid value 'abc' for '--level <LEVEL>'", "For more information, try '--help'."]

[[commands]]
name = "Report Export Missing Day Argument Returns InvalidArguments"
stage = "failure"
args = ["report", "export", "day", "--db", "{db_path}"]
expect_exit = 3
expect_error_code = "cli.invalid_arguments"
expect_error_category = "cli"
expect_hints_contains = ["Run command --help to inspect required arguments."]
expect_stderr_contains = ["`report export day` requires <argument>."]

[[commands]]
name = "Query Data Invalid Day Boundary Returns LogicError"
stage = "failure"
args = ["query", "data", "days-stats", "--period", "day", "--period-arg", "20261301", "--db", "{db_path}"]
expect_exit = 6
expect_error_code = "runtime.generic_error"
expect_error_category = "runtime"
expect_hints_contains = ["Inspect `error_message` for detailed failure reason."]
expect_stderr_contains = ["Logic Error:", "Invalid date boundary: 20261301"]
