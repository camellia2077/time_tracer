<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <linearGradient id="gradSharpRoundedWhiteGolden" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    
    <!-- 方案2.2：垂直高度黄金围剿 (Vertical Golden Padding)
         底板变成了一个更小的正方形尺寸，边长 20.943。
         为什么是 20.943？因为它是内部箭头高度 12.944 严格乘以 1.618 得出来的。
         它为这个图形提供了数学上最“严丝合缝”的上下 Padding。
    -->
    <rect x="1.528" y="1.528" width="20.943" height="20.943" rx="4.76" ry="4.76" fill="#FFFFFF" />

    <!-- 重新计算在 20.943 画布里的平移参数，保持左右 2.618 的留白比 -->
    <g transform="translate(1.179, 0)">
        <path d="M13.528,18.472 L12.458,17.402 L17.11,12.75 H12 V11.25 H17.11 L12.458,6.598 L13.528,5.528 L20,12 Z" fill="url(#gradSharpRoundedWhiteGolden)" />
        <rect x="7.636" y="11.25" width="3.158" height="1.5" fill="url(#gradSharpRoundedWhiteGolden)" opacity="0.50" />
        <rect x="3.732" y="11.25" width="1.952" height="1.5" fill="url(#gradSharpRoundedWhiteGolden)" opacity="0.25" />
    </g>
</svg>
