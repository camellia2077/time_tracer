name: Windows Build Matrix

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 0"

jobs:
  prepare-windows-matrix:
    name: prepare-windows-matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate matrix from toolchain config
        id: generate
        shell: bash
        run: |
          MATRIX_JSON="$(python scripts/toolchain/ci/windows_matrix.py --config scripts/toolchain/config/build.toml)"
          echo "matrix=${MATRIX_JSON}" >> "$GITHUB_OUTPUT"

  windows-matrix:
    needs: prepare-windows-matrix
    name: ${{ matrix.job_name }}
    runs-on: windows-latest
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-windows-matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup MSYS2 UCRT64 Toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-clang
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ccache
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-nlohmann-json

      - name: Add UCRT64 Bin To PATH
        shell: pwsh
        run: |
          "C:\msys64\ucrt64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Verify (stable rows)
        if: matrix.cmake_args == ''
        shell: pwsh
        run: |
          python scripts/run.py verify --app tracer_core --profile ${{ matrix.profile }} --build-dir ${{ matrix.build_dir }} --concise

      - name: Verify (experimental row)
        if: matrix.cmake_args != ''
        shell: pwsh
        run: |
          python scripts/run.py verify --app tracer_core --profile ${{ matrix.profile }} --build-dir ${{ matrix.build_dir }} --concise ${{ matrix.cmake_args }}

      - name: Show markdown audit report
        if: always()
        shell: pwsh
        run: |
          $p = "temp/report-md-golden-byte-audit.md"
          if (Test-Path $p) {
            Write-Host "===== $p ====="
            Get-Content $p
          } else {
            Write-Host "Audit report not found: $p"
          }

      - name: Upload markdown audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-md-golden-byte-audit-${{ matrix.job_name }}
          path: temp/report-md-golden-byte-audit.md
          if-no-files-found: warn
