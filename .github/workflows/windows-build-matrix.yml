name: Windows Build Matrix

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 0"

jobs:
  detect-changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      run_heavy_verify: ${{ steps.capability.outputs.run_heavy_verify }}
      run_capability_smoke: ${{ steps.capability.outputs.run_capability_smoke }}
      capability_matrix: ${{ steps.capability.outputs.capability_matrix }}
      capability_reason: ${{ steps.capability.outputs.capability_reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compute capability smoke profiles
        id: capability
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          PAYLOAD="$(python tools/toolchain/ci/capability_smoke_profiles.py --repo-root . --event-name "$EVENT_NAME" --base-sha "$BASE_SHA" --head-sha "$HEAD_SHA")"
          export PAYLOAD
          echo "payload=${PAYLOAD}"
          python - <<'PY' >> "$GITHUB_OUTPUT"
import json
import os

payload = json.loads(os.environ["PAYLOAD"])
print(f"run_heavy_verify={'true' if payload['run_heavy_verify'] else 'false'}")
print(f"run_capability_smoke={'true' if payload['run_capability_smoke'] else 'false'}")
print(f"capability_matrix={payload['matrix']}")
print(f"capability_reason={payload['reason']}")
PY

  prepare-windows-matrix:
    name: prepare-windows-matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate matrix from toolchain config
        id: generate
        shell: bash
        run: |
          MATRIX_JSON="$(python tools/toolchain/ci/windows_matrix.py --config tools/toolchain/config/build.toml)"
          echo "matrix=${MATRIX_JSON}" >> "$GITHUB_OUTPUT"

  windows-capability-smoke:
    needs:
      - detect-changes
    if: needs.detect-changes.outputs.run_capability_smoke == 'true'
    name: capability-smoke (${{ matrix.profile }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.capability_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup MSYS2 UCRT64 Toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-clang
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ccache
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-nlohmann-json

      - name: Add UCRT64 Bin To PATH
        shell: pwsh
        run: |
          "C:\msys64\ucrt64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Focused capability verify
        shell: pwsh
        run: |
          python tools/run.py verify --app tracer_core_shell --profile ${{ matrix.profile }} --build-dir build_fast --concise

  windows-matrix:
    needs:
      - detect-changes
      - prepare-windows-matrix
      - windows-capability-smoke
    name: ${{ matrix.job_name }}
    runs-on: windows-latest
    if: ${{ always() && (needs.detect-changes.outputs.run_heavy_verify == 'true' || needs.detect-changes.outputs.run_heavy_verify == 'false') && (needs.windows-capability-smoke.result == 'success' || needs.windows-capability-smoke.result == 'skipped' || needs.windows-capability-smoke.result == '') }}
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-windows-matrix.outputs.matrix) }}

    steps:
      - name: Skip heavy verify for docs/ui-only change
        if: needs.detect-changes.outputs.run_heavy_verify != 'true'
        shell: pwsh
        run: |
          Write-Host "Skipping Windows verify because this push/PR only changed docs/ui or other non-code paths."

      - name: Checkout
        if: needs.detect-changes.outputs.run_heavy_verify == 'true'
        uses: actions/checkout@v4

      - name: Setup Python
        if: needs.detect-changes.outputs.run_heavy_verify == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup MSYS2 UCRT64 Toolchain
        if: needs.detect-changes.outputs.run_heavy_verify == 'true'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-clang
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ccache
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-nlohmann-json

      - name: Add UCRT64 Bin To PATH
        if: needs.detect-changes.outputs.run_heavy_verify == 'true'
        shell: pwsh
        run: |
          "C:\msys64\ucrt64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Verify tracer_core_shell (stable rows)
        if: needs.detect-changes.outputs.run_heavy_verify == 'true' && matrix.cmake_args == ''
        shell: pwsh
        run: |
          python tools/run.py verify --app tracer_core_shell --profile ${{ matrix.profile }} --build-dir ${{ matrix.build_dir }} --concise

      - name: Verify tracer_core_shell (experimental row)
        if: needs.detect-changes.outputs.run_heavy_verify == 'true' && matrix.cmake_args != ''
        shell: pwsh
        run: |
          python tools/run.py verify --app tracer_core_shell --profile ${{ matrix.profile }} --build-dir ${{ matrix.build_dir }} --concise ${{ matrix.cmake_args }}

      - name: Show markdown audit report
        if: always() && needs.detect-changes.outputs.run_heavy_verify == 'true'
        shell: pwsh
        run: |
          $p = "temp/report-md-golden-byte-audit.md"
          if (Test-Path $p) {
            Write-Host "===== $p ====="
            Get-Content $p
          } else {
            Write-Host "Audit report not found: $p"
          }

      - name: Upload markdown audit report
        if: always() && needs.detect-changes.outputs.run_heavy_verify == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: report-md-golden-byte-audit-${{ matrix.job_name }}
          path: temp/report-md-golden-byte-audit.md
          if-no-files-found: warn
