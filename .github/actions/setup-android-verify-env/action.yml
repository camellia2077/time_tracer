name: Setup Android Verify Env
description: Prepare Python repo tools, JDK 17, Android SDK components, and local.properties for Android verify jobs.

runs:
  using: composite
  steps:
    - name: Setup Python repo tools
      uses: ./.github/actions/setup-python-repo-tools

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"

    - name: Setup Android SDK command-line tools
      uses: android-actions/setup-android@v3

    - name: Install Android SDK packages
      shell: pwsh
      run: |
        $sdkRoot = $env:ANDROID_SDK_ROOT
        if ([string]::IsNullOrWhiteSpace($sdkRoot)) {
          $sdkRoot = $env:ANDROID_HOME
        }
        if ([string]::IsNullOrWhiteSpace($sdkRoot)) {
          $sdkRoot = Join-Path $env:LOCALAPPDATA 'Android\Sdk'
        }
        if (-not (Test-Path $sdkRoot)) {
          throw "Android SDK root not found: $sdkRoot"
        }

        "ANDROID_SDK_ROOT=$sdkRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "ANDROID_HOME=$sdkRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        (Join-Path $sdkRoot 'platform-tools') | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

        $sdkManager = Join-Path $sdkRoot 'cmdline-tools\latest\bin\sdkmanager.bat'
        if (-not (Test-Path $sdkManager)) {
          throw "sdkmanager.bat not found: $sdkManager"
        }

        # Keep Android CI reproducible: install the exact SDK/NDK/CMake versions
        # already declared by the checked-in Gradle build instead of relying on
        # mutable runner defaults.
        1..20 | ForEach-Object { 'y' } | & $sdkManager --licenses | Out-Null
        & $sdkManager --install `
          'platform-tools' `
          'platforms;android-36' `
          'build-tools;36.0.0' `
          'ndk;29.0.14206865' `
          'cmake;4.1.2'
        if ($LASTEXITCODE -ne 0) {
          throw "Failed to install required Android SDK packages."
        }

    - name: Generate apps/android/local.properties
      shell: pwsh
      run: |
        $sdkRoot = $env:ANDROID_SDK_ROOT
        if ([string]::IsNullOrWhiteSpace($sdkRoot)) {
          throw "ANDROID_SDK_ROOT is not set."
        }
        # local.properties uses Java properties escaping rules on Windows, so
        # both path separators and the drive-letter colon must be escaped.
        $escapedSdkRoot = $sdkRoot -replace '\\', '\\'
        $escapedSdkRoot = $escapedSdkRoot -replace ':', '\:'
        $localPropertiesPath = Join-Path $env:GITHUB_WORKSPACE 'apps\android\local.properties'

        # CI should behave like a clean Android workstation: Gradle reads the SDK
        # location from local.properties, while the workflow owns generating it.
        @(
          '## Auto-generated by GitHub Actions for Android verify jobs.',
          "sdk.dir=$escapedSdkRoot"
        ) | Set-Content -Path $localPropertiesPath -Encoding UTF8
