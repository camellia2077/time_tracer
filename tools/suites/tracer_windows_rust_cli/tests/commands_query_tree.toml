# Query tree capability command tests

[[commands]]
name = "Query Tree Help"
stage = "tree"
args = ["query", "tree", "--help"]
expect_exit = 0
expect_stdout_contains = [
  "Display project structure as a tree",
  "Usage: time_tracer_cli.exe query tree [OPTIONS] [ROOT]",
  "[ROOT]",
  "-l, --level <LEVEL>",
  "-r, --roots",
]

[[commands]]
name = "Query Data Help"
stage = "tree"
args = ["query", "data", "--help"]
expect_exit = 0
expect_stdout_contains = [
  "Run semantic data queries",
  "Usage: time_tracer_cli.exe query data [OPTIONS] <ACTION>",
  "<ACTION>",
  "--data-output <DATA_OUTPUT>",
  "possible values: text, json",
  "--period <PERIOD>",
]

[[commands]]
name = "Tree Full"
stage = "tree"
args = ["query", "tree", "--db", "{db_path}"]
expect_exit = 0

[[commands]]
name = "Tree Root Path"
stage = "tree"
args = ["query", "tree", "study", "--db", "{db_path}"]
expect_exit = 0
expect_stdout_contains = ["study"]

[[commands]]
name = "Tree Roots"
stage = "tree"
args = ["query", "tree", "--roots", "--db", "{db_path}"]
expect_exit = 0

[[commands]]
name = "Tree Level 0"
stage = "tree"
args = ["query", "tree", "-l", "0", "--db", "{db_path}"]
expect_exit = 0

[[commands]]
name = "Tree Level 1"
stage = "tree"
args = ["query", "tree", "-l", "1", "--db", "{db_path}"]
expect_exit = 0

[[commands]]
name = "Tree Level 3"
stage = "tree"
args = ["query", "tree", "-l", "3", "--db", "{db_path}"]
expect_exit = 0
