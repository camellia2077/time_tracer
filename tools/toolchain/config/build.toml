[build]
# Toolchain selector used by tools/run.py configure.
# Values: "default" | "clang" | "gcc"
# NOTE:
# Main executable LTO can fail on some toolchains, so build scripts
# keep `-DENABLE_LTO=OFF` by default for program targets.
# DLL targets may enable LTO in project-specific scripts where supported.
compiler = "clang"
default_profile = "fast"

# Optional explicit overrides. When both are set, they take precedence over `compiler`.
# c_compiler = "clang"
# cxx_compiler = "clang++"

[build.profiles._fast_base]
description = "Base fast profile for local/CI derivation."
build_dir = "build_fast"
cmake_args = [
    "-D", "CMAKE_BUILD_TYPE=Release",
    "-D", "DISABLE_OPTIMIZATION=ON",
    "-D", "ENABLE_LTO=OFF",
    "-D", "ENABLE_CLANG_TIDY=OFF",
    "-D", "WARNING_LEVEL=0",
    "-D", "TIDY_WARNINGS_AS_ERRORS=OFF",
]
gradle_tasks = [":app:assembleDebug"]

[build.profiles.fast]
extends = "_fast_base"
description = "Fast local verification profile."

[build.profiles.fast_ci_no_pch]
extends = "_fast_base"
description = "CI fast profile with PCH disabled for toolchain/header compatibility."
cmake_args = [
    "-D", "ENABLE_PCH=OFF",
]

[build.profiles.release_safe]
description = "Release build with optimization, but LTO/FTO disabled for stability."
build_dir = "build"
cmake_args = [
    "-D", "CMAKE_BUILD_TYPE=Release",
    "-D", "DISABLE_OPTIMIZATION=OFF",
    "-D", "ENABLE_LTO=OFF",
    "-D", "WARNING_LEVEL=2",
    "-D", "TIDY_WARNINGS_AS_ERRORS=OFF",
]
gradle_tasks = [":app:assembleRelease"]

[build.profiles._release_bundle_base]
description = "Base windows release bundle profile."
build_dir = "build"
cmake_args = [
    "-D", "CMAKE_BUILD_TYPE=Release",
    "-D", "DISABLE_OPTIMIZATION=OFF",
    "-D", "ENABLE_LTO=OFF",
    "-D", "BUILD_TESTING=OFF",
    "-D", "TT_USE_BUNDLED_SQLITE=ON",
    "-D", "TT_TOML_HEADER_ONLY=ON",
    "-D", "TT_STATIC_MINGW_RUNTIME=ON",
    "-D", "WARNING_LEVEL=2",
    "-D", "TIDY_WARNINGS_AS_ERRORS=OFF",
]
gradle_tasks = [":app:assembleRelease"]

[build.profiles.release_bundle]
extends = "_release_bundle_base"
description = "Windows release bundle profile: bundled sqlite + toml header-only + static EXE runtime."

[build.profiles.release_bundle_ci_no_pch]
extends = "_release_bundle_base"
description = "Windows release bundle CI profile with PCH disabled for toolchain/header compatibility."
cmake_args = [
    "-D", "ENABLE_PCH=OFF",
]

[build.profiles.core_lite]
description = "Release-lite build for reduced core size (markdown-only, no processed JSON IO)."
build_dir = "build_lite"
cmake_args = [
    "-D", "CMAKE_BUILD_TYPE=Release",
    "-D", "DISABLE_OPTIMIZATION=OFF",
    "-D", "ENABLE_LTO=OFF",
    "-D", "TT_ENABLE_PROCESSED_JSON_IO=OFF",
    "-D", "TT_REPORT_ENABLE_LATEX=OFF",
    "-D", "TT_REPORT_ENABLE_TYPST=OFF",
    "-D", "WARNING_LEVEL=2",
    "-D", "TIDY_WARNINGS_AS_ERRORS=OFF",
]
gradle_tasks = [":app:assembleRelease"]

[build.profiles.check]
description = "Release build with clang-tidy checks enabled and LTO/FTO disabled."
build_dir = "build_check"
cmake_args = [
    "-D", "CMAKE_BUILD_TYPE=Release",
    "-D", "DISABLE_OPTIMIZATION=OFF",
    "-D", "ENABLE_LTO=OFF",
    "-D", "ENABLE_CLANG_TIDY=ON",
    "-D", "ENABLE_PCH=OFF",
    "-D", "WARNING_LEVEL=2",
    "-D", "TIDY_WARNINGS_AS_ERRORS=OFF",
]
gradle_tasks = [":app:assembleDebug"]

[build.profiles.android_style]
description = "Android style checks (ktlint + lintDebug; detekt disabled in this flow)."
gradle_tasks = [
    ":app:ktlintCheck",
    ":app:lintDebug",
]

[build.profiles.android_edit]
description = "Android edit-loop build only (AS-first debug APK path, no QA finalizers)."
gradle_tasks = [
    ":app:assembleDebug",
]

[build.profiles.android_ci]
description = "Android CI checks (snapshot verify + debug/local QA + release QA)."
gradle_tasks = [
    ":runtime:verifyTracerCoreConfigSnapshot",
    ":app:check",
    ":app:qaRelease",
]

[build.profiles.android_release]
description = "Android release APK build with native optimization enabled and without QA finalizers."
gradle_tasks = [":app:assembleRelease"]
gradle_args = [
    "-PtimeTracerDisableNativeOptimization=false",
]

[build.profiles.android_release_no_opt]
description = "Android release APK build without native optimization and without QA finalizers."
gradle_tasks = [":app:assembleRelease"]
gradle_args = [
    "-PtimeTracerDisableNativeOptimization=true",
]

[build.profiles.android_device]
description = "Android instrumentation on connected device/emulator (non-default)."
gradle_tasks = [
    ":app:connectedDebugAndroidTest",
]

[build.ci]
# Source of truth for GitHub Actions windows matrix generation.
[[build.ci.windows_matrix]]
job_name = "optimized"
profile = "release_bundle_ci_no_pch"
build_dir = "build_release"
cmake_args = ""
allow_failure = false

[[build.ci.windows_matrix]]
job_name = "lto"
profile = "release_bundle_ci_no_pch"
build_dir = "build_lto"
cmake_args = "--cmake-args=-DTT_ENABLE_LTO=ON"
allow_failure = false
