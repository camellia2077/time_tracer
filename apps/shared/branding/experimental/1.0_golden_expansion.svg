<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <linearGradient id="gradSharpRoundedWhiteGolden" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    
    <rect x="1" y="1" width="22" height="22" rx="5" ry="5" fill="#FFFFFF" />

    <g transform="translate(1.5, 0)">
        <!-- 方案1.0：纯粹的黄金扩张 (Golden Expansion) 
             主箭头起点 X=12，其由长方形+三角形组成。我们假设矩形长 L3 约等于 3.5~4
             这里设计：
             L1 (尾段) = 1.3
             Gap1 = 2.1 (≈ 1.3 * 1.618)
             L2 (中段) = 2.1 (≈ 1.3 * 1.618)
             Gap2 = 1.3 (越往右间距越小，体现加速度结构缩紧)
             L3 (主箭头矩形部分) ~ 3.4 (≈ 2.1 * 1.618) (起点X=12 也就是 12-3.4=8.6，但是箭头身子自带了一段，所以我们从X=12倒推)
        -->
        
        <!-- Segment 3 (Main Arrow) 保持右端点起点 X = 12 不变 
             主箭头的直干长度为 5.11 (从X=12到X=17.11) -->
        <path d="M14,18l-1.07,-1.07 4.18,-4.18H12V11.25h5.11L12.93,7.07 14,6l6,6 -6,6Z" fill="url(#gradSharpRoundedWhiteGolden)" />

        <!-- Segment 2 (Middle Trail) 
             长度 L2 = L3 / 1.618 ≈ 3.158
             与主箭头间距 Gap2 = 1.206
             X = 12 - Gap2 - L2 = 7.636 -->
        <rect x="7.636" y="11.25" width="3.158" height="1.5" fill="url(#gradSharpRoundedWhiteGolden)" opacity="0.6" />

        <!-- Segment 1 (Left Trail) 
             长度 L1 = L2 / 1.618 ≈ 1.952
             与中段间距 Gap1 = Gap2 * 1.618 ≈ 1.952
             X = 7.636 - Gap1 - L1 = 3.732 -->
        <rect x="3.732" y="11.25" width="1.952" height="1.5" fill="url(#gradSharpRoundedWhiteGolden)" opacity="0.3" />
    </g>
</svg>
