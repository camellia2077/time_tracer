<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <linearGradient id="gradSharpRoundedWhiteGolden" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    
    <!-- 原底板大小：22x22 -->
    <rect x="1" y="1" width="22" height="22" rx="5" ry="5" fill="#FFFFFF" />

    <!-- 箭头图形组右移 (translateX = 1.5) -->
    <g transform="translate(1.5, 0)">
        <!-- Segment 3 (Main Arrow) 保持位置不变，起点 X = 12 -->
        <path d="M14,18l-1.07,-1.07 4.18,-4.18H12V11.25h5.11L12.93,7.07 14,6l6,6 -6,6Z" fill="url(#gradSharpRoundedWhiteGolden)" />

        <!-- Segment 2 (Middle Trail) 
             保持长度不变 (3.578) 
             和主箭头的间距增加为黄金比例数值 1.366 (X=12-1.366-3.578=7.056)
        -->
        <rect x="7.056" y="11.25" width="3.578" height="1.5" fill="url(#gradSharpRoundedWhiteGolden)" opacity="0.6" />

        <!-- Segment 1 (Left Trail) 
             保持长度不变 (2.211) 
             和中段的间距增加为黄金比例数值 2.211 (X=7.056-2.211-2.211=2.634)
        -->
        <rect x="2.634" y="11.25" width="2.211" height="1.5" fill="url(#gradSharpRoundedWhiteGolden)" opacity="0.3" />
    </g>
</svg>
